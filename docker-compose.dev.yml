services:
  dexlot-bot-dev:
    image: dexlot-bot-dev
    container_name: dexlot-bot-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: python main.py
    user: "1000:1000"
    restart: unless-stopped
    env_file: .env
    environment:
    - MPLCONFIGDIR=/tmp/matplotlib
    ports:
      - "${DOCKER_IP}:${DOCKER_PORT}:8000"

  # dexlot-bot-notification-dev:
  #   image: dexlot-bot-dev
