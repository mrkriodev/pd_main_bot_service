  #   user: "1000:1000"
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     - APP_CONFIG__DB__HOST=host.docker.internal
  #     - APP_CONFIG__DB__PORT=5433
  #   volumes:
  #     - ./html/:/app/utils/generator_images/html:rw

  dexlot-bot-redis-dev:
    image: redis:latest
    container_name: dexlot-bot-redis-dev
    volumes:
      - ./redis-data/:/data:rw
    restart: unless-stopped
    user: "1000:1000"

networks:
    dexlot-bot-network-dev:
        driver: bridge